<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460" role="img" aria-label="Plans demo: plans-init sets up your project in seconds">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      .bg        { fill: #0f1117; }
      .titlebar  { fill: #1c1f26; }
      .dot-r     { fill: #ff5f57; }
      .dot-y     { fill: #febc2e; }
      .dot-g     { fill: #28c840; }
      .title     { fill: #6b7280; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 11px; }
      .prompt    { fill: #a3e635; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 12.5px; font-weight: 700; }
      .cmd       { fill: #f8fafc; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 12.5px; }
      .ok        { fill: #4ade80; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 12.5px; }
      .muted     { fill: #64748b; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 12.5px; }
      .label-h   { fill: #94a3b8; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; }
      .section   { fill: #6366f1; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 12px; font-weight: 700; }
      .row-k     { fill: #e2e8f0; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 11.5px; }
      .row-v     { fill: #94a3b8; font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 11.5px; }
      .cursor    { fill: #f8fafc; }

      /* fade-in helpers */
      .fade { opacity: 0; animation-fill-mode: forwards; animation-timing-function: ease-in; }
      .blink { animation: blink 0.9s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      /* line-by-line reveal */
      .l01 { animation: fadeIn 0.15s 0.3s  forwards; }
      .l02 { animation: fadeIn 0.15s 1.6s  forwards; }
      .l03 { animation: fadeIn 0.15s 2.0s  forwards; }
      .l04 { animation: fadeIn 0.15s 2.4s  forwards; }
      .l05 { animation: fadeIn 0.15s 2.8s  forwards; }
      .l06 { animation: fadeIn 0.15s 3.2s  forwards; }
      .l07 { animation: fadeIn 0.15s 3.6s  forwards; }
      .l08 { animation: fadeIn 0.15s 4.2s  forwards; }
      .l09 { animation: fadeIn 0.15s 4.6s  forwards; }
      .l10 { animation: fadeIn 0.15s 5.0s  forwards; }
      .l11 { animation: fadeIn 0.15s 5.6s  forwards; }
      .l12 { animation: fadeIn 0.15s 6.0s  forwards; }
      .l13 { animation: fadeIn 0.15s 6.4s  forwards; }
      .l14 { animation: fadeIn 0.15s 6.8s  forwards; }
      .l15 { animation: fadeIn 0.15s 7.2s  forwards; }

      /* status panel lines */
      .s01 { animation: fadeIn 0.2s 7.8s  forwards; }
      .s02 { animation: fadeIn 0.2s 8.2s  forwards; }
      .s03 { animation: fadeIn 0.2s 8.5s  forwards; }
      .s04 { animation: fadeIn 0.2s 8.8s  forwards; }
      .s05 { animation: fadeIn 0.2s 9.1s  forwards; }
      .s06 { animation: fadeIn 0.2s 9.4s  forwards; }
      .s07 { animation: fadeIn 0.2s 9.7s  forwards; }
      .s08 { animation: fadeIn 0.2s 10.0s forwards; }
      .s09 { animation: fadeIn 0.2s 10.3s forwards; }
      .s10 { animation: fadeIn 0.2s 10.6s forwards; }

      /* cursor blink stops when typing done */
      .cur01 { animation: fadeIn 0.01s 0.3s forwards, blink 0.9s 0.3s step-end 3; }
      .cur02 { animation: fadeIn 0.01s 1.55s forwards, blink 0.9s 1.55s step-end 999; }

      @keyframes fadeIn { to { opacity: 1; } }
    </style>
  </defs>

  <!-- Terminal window -->
  <rect width="760" height="460" rx="10" class="bg"/>

  <!-- Title bar -->
  <rect width="760" height="36" rx="10" class="titlebar"/>
  <rect y="26" width="760" height="10" class="titlebar"/>
  <circle cx="20" cy="18" r="6" class="dot-r"/>
  <circle cx="38" cy="18" r="6" class="dot-y"/>
  <circle cx="56" cy="18" r="6" class="dot-g"/>
  <text x="380" y="23" text-anchor="middle" class="title">bash — myproject</text>

  <!-- ── LEFT PANEL: terminal ── -->

  <!-- prompt + command typing -->
  <g class="fade l01">
    <text x="24" y="68" class="prompt">~ myproject</text>
    <text x="130" y="68" class="cmd"> $ plans-init</text>
  </g>

  <!-- output lines -->
  <g class="fade l02"><text x="24" y="88"  class="ok">OK: scaffolded myproject/plans/</text></g>
  <g class="fade l03"><text x="24" y="104" class="ok">OK: plans/ added to .git/info/exclude</text></g>
  <g class="fade l04"><text x="24" y="120" class="ok">OK: appended plans section to CLAUDE.md</text></g>
  <g class="fade l05"><text x="24" y="136" class="ok">OK: installed /plans skill to .claude/skills/</text></g>

  <g class="fade l06"><text x="24" y="160" class="muted">Next steps:</text></g>
  <g class="fade l07"><text x="24" y="176" class="muted">  1. Read plans/README.md</text></g>
  <g class="fade l08"><text x="24" y="192" class="muted">  2. Run /plans new to create your first plan</text></g>
  <g class="fade l09"><text x="24" y="208" class="muted">  3. Open the dashboard:</text></g>
  <g class="fade l10"><text x="24" y="224" class="muted">     npx serve .</text></g>
  <g class="fade l11"><text x="24" y="240" class="muted">     → localhost:3000/plans/roadmap.html</text></g>

  <!-- second prompt: /plans new -->
  <g class="fade l12">
    <text x="24" y="264" class="prompt">~ myproject</text>
    <text x="130" y="264" class="cmd"> $ # inside Claude Code...</text>
  </g>
  <g class="fade l13">
    <text x="24" y="284" class="prompt">&gt;</text>
    <text x="38"  y="284" class="cmd"> /plans new</text>
  </g>
  <g class="fade l14"><text x="24" y="300" class="ok">  Plan name? Dark Mode</text></g>
  <g class="fade l15"><text x="24" y="316" class="ok">  Created plans/active/DARK_MODE.md</text></g>

  <!-- blinking cursor at end of terminal -->
  <rect x="24" y="328" width="7" height="14" rx="1" class="cursor fade cur02"/>

  <!-- divider -->
  <line x1="390" y1="44" x2="390" y2="450" stroke="#1e2330" stroke-width="2"/>

  <!-- ── RIGHT PANEL: STATUS.md ── -->
  <g class="fade s01">
    <text x="408" y="64" class="label-h">STATUS.md</text>
  </g>

  <!-- In flight section -->
  <g class="fade s02">
    <rect x="408" y="72" width="328" height="22" rx="4" fill="#1e1e3a"/>
    <text x="416" y="87" class="section">## In flight</text>
    <text x="556" y="87" class="muted" font-size="10">auto-generated</text>
  </g>
  <g class="fade s03">
    <text x="416" y="106" class="row-k">Dark Mode</text>
    <text x="530" y="106" class="row-v">Phase 2/3 · Yash · 2026-05-12</text>
  </g>
  <g class="fade s04">
    <text x="416" y="122" class="row-k">Search Index</text>
    <text x="530" y="122" class="row-v">Phase 1/2 · Steve · 2026-05-09</text>
  </g>

  <!-- Up next section -->
  <g class="fade s05">
    <rect x="408" y="138" width="328" height="22" rx="4" fill="#1e2a1e"/>
    <text x="416" y="153" class="section" fill="#f59e0b">## Up next</text>
    <text x="528" y="153" class="muted" font-size="10">auto-generated</text>
  </g>
  <g class="fade s06">
    <text x="416" y="172" class="row-k">Theme Picker</text>
    <text x="530" y="172" class="row-v">depends on Dark Mode</text>
  </g>
  <g class="fade s07">
    <text x="416" y="188" class="row-k">Autocomplete</text>
    <text x="530" y="188" class="row-v">depends on Search Index</text>
  </g>

  <!-- Recently shipped -->
  <g class="fade s08">
    <rect x="408" y="204" width="328" height="22" rx="4" fill="#1a2e1a"/>
    <text x="416" y="219" class="section" fill="#4ade80">## Recently shipped</text>
  </g>
  <g class="fade s09">
    <text x="416" y="238" class="row-k">Onboarding</text>
    <text x="530" y="238" class="row-v">shipped 2026-04-23</text>
  </g>

  <!-- Backlog -->
  <g class="fade s10">
    <rect x="408" y="254" width="328" height="22" rx="4" fill="#1c1f26"/>
    <text x="416" y="269" class="section" fill="#94a3b8">## Backlog</text>
    <text x="510" y="269" class="muted" font-size="10">hand-maintained</text>
  </g>

  <!-- mini gantt bars -->
  <g class="fade s10">
    <text x="408" y="306" class="label-h">ROADMAP</text>

    <!-- bar bg -->
    <rect x="408" y="314" width="328" height="12" rx="3" fill="#1c1f26"/>
    <rect x="408" y="330" width="328" height="12" rx="3" fill="#1c1f26"/>
    <rect x="408" y="346" width="328" height="12" rx="3" fill="#1c1f26"/>

    <!-- Dark Mode bar: Apr28-May12, today May6 -->
    <rect x="408" y="314" width="220" height="12" rx="3" fill="#6366f1" opacity="0.85"/>
    <!-- Search Index bar: Apr24-May9 -->
    <rect x="408" y="330" width="170" height="12" rx="3" fill="#6366f1" opacity="0.6"/>
    <!-- Theme Picker bar: May12-May20 -->
    <rect x="628" y="346" width="108" height="12" rx="3" fill="#f59e0b" opacity="0.85"/>

    <!-- today line -->
    <line x1="578" y1="308" x2="578" y2="362" stroke="#ef4444" stroke-width="2"/>
    <text x="572" y="306" class="muted" fill="#ef4444" font-size="9" font-weight="700">today</text>

    <!-- labels -->
    <text x="412" y="323"  class="muted" font-size="9.5" fill="#e2e8f0">Dark Mode</text>
    <text x="412" y="339"  class="muted" font-size="9.5" fill="#e2e8f0">Search Index</text>
    <text x="630" y="355"  class="muted" font-size="9.5" fill="#e2e8f0">Theme Picker</text>
  </g>

  <!-- bottom caption -->
  <g class="fade s10">
    <text x="408" y="400" class="muted" font-size="11">One command. Instant context for you</text>
    <text x="408" y="416" class="muted" font-size="11">and your AI assistant.</text>
    <text x="408" y="436" fill="#6366f1" font-family="'JetBrains Mono','Courier New',monospace" font-size="11">github.com/yrangana/Plans</text>
  </g>

</svg>
